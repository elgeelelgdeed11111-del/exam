<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>امتحان الصف الأول الإعدادي - مدرسة الجيل الجديد</title>
    <!-- KaTeX for LaTeX support -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous" onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '\\[', right: '\\]', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}]});"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Cairo', sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #f0f2f5, #e6e9f0);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .school-header {
            background: white;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-bottom: 5px solid #ffd700;
        }
        
        .school-header h1 {
            color: #1a2b4c;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .school-header .sub {
            color: #666;
            font-size: 1rem;
            background: #f8f9fa;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
        }
        
        .card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .code-input-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .code-input-group input {
            flex: 1;
            padding: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 18px;
            text-align: center;
            direction: ltr;
            font-weight: 600;
        }
        
        .code-input-group button {
            background: linear-gradient(145deg, #1a2b4c, #2d3f5e);
            color: white;
            border: none;
            width: 70px;
            border-radius: 20px;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .student-info {
            background: #f8fafc;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border-right: 5px solid #ffd700;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #dee2e6;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .timer-container {
            position: sticky;
            top: 10px;
            z-index: 100;
            margin: 20px 0;
            background: transparent;
            padding: 0;
        }
        
        .timer {
            background: #1a2b4c;
            color: white;
            padding: 20px;
            border-radius: 50px;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
        }
        
        .timer.warning {
            background: #dc3545;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        
        .question-item {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 2px solid #e9ecef;
        }
        
        .question-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }
        
        .question-number {
            background: #1a2b4c;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a2b4c;
            flex: 1;
            direction: rtl;
            text-align: right;
            line-height: 1.6;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        
        .option-item {
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-item:hover {
            border-color: #1a2b4c;
            background: #f1f5f9;
        }
        
        .option-item.selected {
            background: #1a2b4c;
            border-color: #1a2b4c;
            color: white;
        }
        
        .option-letter {
            background: #dee2e6;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #1a2b4c;
            flex-shrink: 0;
        }
        
        .option-item.selected .option-letter {
            background: white;
            color: #1a2b4c;
        }
        
        .option-text {
            flex: 1;
            direction: rtl;
            text-align: right;
            line-height: 1.5;
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin: 10px 0;
            transition: transform 0.2s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(145deg, #1a2b4c, #2d3f5e);
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .result-card {
            background: #d4edda;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            border: 3px solid #28a745;
            margin-top: 20px;
        }
        
        .result-score {
            font-size: 4rem;
            font-weight: 800;
            color: #155724;
            margin: 20px 0;
        }
        
        .loading-bar {
            height: 4px;
            background: linear-gradient(90deg, #1a2b4c, #ffd700, #1a2b4c);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            display: none;
            border-radius: 2px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .alert {
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .katex { 
            font-size: 1.2em; 
            direction: ltr;
            display: inline-block;
        }
        
        .katex-display {
            margin: 0.5em 0;
            direction: ltr;
            text-align: center;
        }
        
        /* تحسينات للموبايل */
        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .question-text {
                font-size: 1rem;
            }
            
            .timer {
                font-size: 2rem;
                padding: 15px;
            }
            
            .question-item {
                padding: 15px;
            }
            
            .option-item {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="school-header">
            <h1>📚 مدرسة الجيل الجديد الخاصة</h1>
            <div class="sub">امتحان الصف الأول الإعدادي - الرياضيات</div>
        </div>

        <div class="loading-bar" id="loadingBar"></div>
        <div class="alert" id="alertMessage"></div>

        <!-- Login Section -->
        <div class="card" id="loginSection">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 4rem;">👨‍🎓</div>
                <h2>تسجيل دخول الطالب</h2>
            </div>
            
            <div class="code-input-group">
                <input type="text" id="studentCode" placeholder="أدخل الكود (مثال: D123456)" maxlength="7" dir="ltr">
                <button onclick="login()">←</button>
            </div>

            <div style="text-align: center; color: #666; font-size: 0.9rem;">
                ⏰ الامتحان متاح طوال اليوم (تم تعطيل شرط الوقت للتجربة)
            </div>
        </div>

        <!-- Student Info Section -->
        <div class="card" id="studentInfoSection" style="display: none;">
            <div class="student-info" id="studentInfo"></div>
            
            <!-- Timer Container -->
            <div class="timer-container">
                <div class="timer" id="timer">20:00</div>
            </div>
            
            <!-- Exam Questions -->
            <div id="questionsContainer"></div>
            
            <!-- Submit Button -->
            <button class="btn btn-success" id="submitBtn" onclick="submitExam()" style="display: none;">✅ تسليم الامتحان</button>
            <button class="btn btn-primary" onclick="logout()">🚪 تسجيل خروج</button>
        </div>

        <!-- Result Section -->
        <div class="card" id="resultSection" style="display: none;">
            <div class="result-card">
                <div style="font-size: 3rem;">🏆</div>
                <h2>تم تسليم الامتحان بنجاح</h2>
                <div class="result-score" id="resultScore">0/10</div>
                <div id="resultDetails"></div>
                <button class="btn btn-primary" onclick="logout()" style="margin-top: 20px;">عودة للصفحة الرئيسية</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            getDoc, 
            setDoc, 
            increment,
            Timestamp
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB27lyphN9YxgB4eFwuKWi0ghjuAutpu8o",
            authDomain: "manssa-oloom1352007.firebaseapp.com",
            projectId: "manssa-oloom1352007",
            storageBucket: "manssa-oloom1352007.firebasestorage.app",
            messagingSenderId: "191595591961",
            appId: "1:191595591961:web:79ff9bbb52cc08cb862d88"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ========== Constants ==========
        const GRADE_LETTER = 'D'; // الأول الإعدادي
        const GRADE_NAME = 'الصف الأول الإعدادي';
        const SUBJECT_LETTER = 'M'; // رياضيات
        const SUBJECT_NAME = 'الرياضيات';
        const EXAM_ID = 'D_M'; // grade_subject
        const CURRENT_WEEK = getWeekNumber();
        const EXAM_DURATION = 20 * 60; // 20 minutes in seconds
        
        // Exam Questions (مع دعم LaTeX) - تم تعديل السؤال العاشر
        const EXAM_QUESTIONS = [
            {
                text: 'أي مما يأتي يساوي $(-3)^2$ ؟',
                options: ['$-9$', '$9$', '$6$', '$-6$'],
                correct: 1 // الثاني (9)
            },
            {
                text: 'أي مما يأتي يساوي $-0.00025$ ؟',
                options: ['$-2.5 \\times 10^{4}$', '$2.5 \\times 10^{-4}$', '$-2.5 \\times 10^{-4}$', '$2.5 \\times 10^{-5}$'],
                correct: 2 // الثالث (-2.5 × 10^-4)
            },
            {
                text: 'المعكوس الضربي للعدد $\\sqrt[3]{\\frac{8}{27}}$ هو ............',
                options: ['$\\frac{4}{9}$', '$-\\frac{2}{3}$', '$-\\frac{3}{2}$', '$\\frac{3}{2}$'],
                correct: 3 // الرابع (3/2)
            },
            {
                text: 'نصف العدد $2^x$ هو ............',
                options: ['$1^x$', '$(\\frac{1}{2})^x$', '$2^{x+1}$', '$2^{x-1}$'],
                correct: 3 // الرابع (2^{x-1})
            },
            {
                text: 'أي مما يأتي يساوي $y \\times y^3 \\times y^{-3} \\times x^{-2} \\times x^{-2} \\times x^{-3}$ ؟',
                options: ['$y^7 x^{-7}$', '$y \\times x^{-7}$', '$y^2 \\times x^{-5}$', '$y \\times x^{-5}$'],
                correct: 1 // الثاني (y × x^-7)
            },
            {
                text: 'أي من الآتي هو الأكبر؟',
                options: ['$7.2 \\times 10^{-3}$', '$7.2 \\times 10^{-5}$', '$6.4 \\times 10^{-2}$', '$4.6 \\times 10^{-7}$'],
                correct: 0 // الأول (7.2 × 10^-3)
            },
            {
                text: '$\\sqrt[3]{x^{12}} = \\sqrt{\\dots}$',
                options: ['$x^4$', '$x^6$', '$x^8$', '$x^{12}$'],
                correct: 2 // الثالث (x^8)
            },
            {
                text: 'إذا كان $x^3 = -1$ فما قيمة $x$؟',
                options: ['$-1$', '$1$', '$0$', '$-3$'],
                correct: 0 // الأول (-1)
            },
            {
                text: 'إذا كان $745 \\times 10^{-9} = k \\times 10^{-7}$ فما قيمة $k$؟',
                options: ['$74.5$', '$7.45$', '$0.745$', '$0.0745$'],
                correct: 1 // الثاني (7.45)
            },
            {
                text: '$\\sqrt[3]{x^{18}}$',
                options: ['$x^6$', '$x^9$', '$x^{12}$', '$x^{15}$'],
                correct: 2 // الثالث (x^12) - تم التعديل هنا
            }
        ];

        // ========== State ==========
        let currentStudent = null;
        let studentAnswers = {};
        let timerInterval = null;
        let examStartTime = null;
        let timeLeft = EXAM_DURATION;

        // Helper Functions
        function getWeekNumber() {
            const today = new Date();
            const firstDayOfYear = new Date(today.getFullYear(), 0, 1);
            const pastDaysOfYear = (today - firstDayOfYear) / 86400000;
            return Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
        }

        function showLoading() {
            document.getElementById('loadingBar').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loadingBar').style.display = 'none';
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 3000);
        }

        function renderMath() {
            if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ]
                });
            }
        }

        // ========== Timer Management with Persistence ==========
        function initializeTimer() {
            const timerKey = `exam_timer_${currentStudent.code}_W${CURRENT_WEEK}`;
            const savedTimer = localStorage.getItem(timerKey);
            
            if (savedTimer) {
                try {
                    const timerData = JSON.parse(savedTimer);
                    const elapsedSeconds = Math.floor((Date.now() - timerData.startTime) / 1000);
                    timeLeft = Math.max(0, EXAM_DURATION - elapsedSeconds);
                    
                    if (timeLeft <= 0) {
                        submitExam();
                        return;
                    }
                } catch (e) {
                    console.error('Error loading timer:', e);
                    startNewTimer();
                }
            } else {
                startNewTimer();
            }
            
            startTimerCountdown();
        }

        function startNewTimer() {
            examStartTime = Date.now();
            timeLeft = EXAM_DURATION;
            
            const timerKey = `exam_timer_${currentStudent.code}_W${CURRENT_WEEK}`;
            localStorage.setItem(timerKey, JSON.stringify({
                startTime: examStartTime,
                duration: EXAM_DURATION
            }));
        }

        function startTimerCountdown() {
            const timerEl = document.getElementById('timer');
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                    return;
                }
                
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                // Visual warnings
                timerEl.classList.remove('warning');
                if (timeLeft <= 60) {
                    timerEl.classList.add('warning');
                }
            }, 1000);
        }

        function clearTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            if (currentStudent) {
                const timerKey = `exam_timer_${currentStudent.code}_W${CURRENT_WEEK}`;
                localStorage.removeItem(timerKey);
            }
        }

        // ========== Login ==========
        window.login = async function() {
            const code = document.getElementById('studentCode').value.trim().toUpperCase();
            
            if (!code) {
                showAlert('❌ من فضلك أدخل الكود', 'error');
                return;
            }

            const validPattern = /^[A-E]\d{6}$/;
            if (!validPattern.test(code)) {
                showAlert('❌ صيغة الكود غير صحيحة', 'error');
                return;
            }

            showLoading();

            try {
                // Get student data from Firebase
                const studentRef = doc(db, 'students', code);
                let studentSnap = await getDoc(studentRef);
                
                if (!studentSnap.exists()) {
                    // Static data for first grade students
                    const staticStudents = {
                        'D443446': { name: 'احمد غريب محمد احمد عمران احمد', gradeLetter: 'D' },
                        'D654926': { name: 'احمد محمد محروس عبد العظيم', gradeLetter: 'D' },
                        'D315599': { name: 'آدم ابراهيم ابوالعلا ابراهيم حسن', gradeLetter: 'D' },
                        'D742266': { name: 'ادم رمضان عبدالمنعم محمد حسن', gradeLetter: 'D' },
                        'D600622': { name: 'ادم ياسر فوزى حسن شمروخ', gradeLetter: 'D' },
                        'D845076': { name: 'ادهم صبرى حسن ابراهيم السيد', gradeLetter: 'D' }
                    };
                    
                    if (staticStudents[code]) {
                        currentStudent = {
                            code: code,
                            name: staticStudents[code].name,
                            gradeLetter: staticStudents[code].gradeLetter
                        };
                    } else {
                        showAlert('❌ الكود غير صحيح أو غير مسجل', 'error');
                        hideLoading();
                        return;
                    }
                } else {
                    currentStudent = { code: code, ...studentSnap.data() };
                }

                // Check if student is in first grade
                if (currentStudent.gradeLetter !== 'D') {
                    showAlert('❌ هذا الامتحان مخصص للصف الأول الإعدادي فقط', 'error');
                    hideLoading();
                    return;
                }

                // Check if already examined this week
                const resultId = `${code}_G${currentStudent.gradeLetter}_S${SUBJECT_LETTER}_W${CURRENT_WEEK}`;
                const resultRef = doc(db, 'results', resultId);
                const resultSnap = await getDoc(resultRef);

                if (resultSnap.exists()) {
                    const prevResult = resultSnap.data();
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('studentInfoSection').style.display = 'block';
                    document.getElementById('resultSection').style.display = 'block';
                    document.getElementById('studentInfoSection').style.display = 'none';
                    
                    document.getElementById('resultScore').textContent = `${prevResult.score}/${prevResult.totalQuestions}`;
                    document.getElementById('resultDetails').innerHTML = `
                        <p>لقد أديت هذا الامتحان مسبقاً</p>
                        <p>📅 التاريخ: ${new Date(prevResult.date).toLocaleString('ar-EG')}</p>
                    `;
                    hideLoading();
                    return;
                }

                // Save student code for next time
                localStorage.setItem('studentCode', code);

                // Show exam
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('studentInfoSection').style.display = 'block';
                
                displayStudentInfo();
                displayQuestions();
                
                // Initialize timer with persistence
                initializeTimer();
                
                // Load any saved answers
                loadSavedAnswers();

            } catch (error) {
                console.error('Login error:', error);
                showAlert('❌ حدث خطأ في تسجيل الدخول', 'error');
            }

            hideLoading();
        };

        function displayStudentInfo() {
            document.getElementById('studentInfo').innerHTML = `
                <div class="info-row">
                    <span>👤 الاسم</span>
                    <span><strong>${currentStudent.name}</strong></span>
                </div>
                <div class="info-row">
                    <span>📚 المرحلة</span>
                    <span><strong>${GRADE_NAME}</strong></span>
                </div>
                <div class="info-row">
                    <span>📝 المادة</span>
                    <span><strong>${SUBJECT_NAME}</strong></span>
                </div>
                <div class="info-row">
                    <span>📅 الأسبوع</span>
                    <span><strong>${CURRENT_WEEK}</strong></span>
                </div>
                <div class="info-row">
                    <span>🔢 الكود</span>
                    <span><strong>${currentStudent.code}</strong></span>
                </div>
            `;
        }

        function displayQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';

            EXAM_QUESTIONS.forEach((q, index) => {
                html += `
                    <div class="question-item" id="q${index}">
                        <div class="question-header">
                            <div class="question-number">${index + 1}</div>
                            <div class="question-text">${q.text}</div>
                        </div>
                        <div class="options-grid">
                `;

                q.options.forEach((opt, optIndex) => {
                    const letter = String.fromCharCode(65 + optIndex); // أ, ب, ج, د
                    html += `
                        <div class="option-item" onclick="selectOption(${index}, ${optIndex})" id="q${index}opt${optIndex}">
                            <span class="option-letter">${letter}</span>
                            <span class="option-text">${opt}</span>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
            document.getElementById('submitBtn').style.display = 'block';
            
            // Render LaTeX
            setTimeout(renderMath, 100);
        }

        window.selectOption = function(qIndex, optIndex) {
            // Remove selected class from all options of this question
            for (let i = 0; i < 4; i++) {
                const el = document.getElementById(`q${qIndex}opt${i}`);
                if (el) el.classList.remove('selected');
            }
            
            // Add selected class to chosen option
            const selectedEl = document.getElementById(`q${qIndex}opt${optIndex}`);
            if (selectedEl) selectedEl.classList.add('selected');
            
            // Save answer
            studentAnswers[qIndex] = optIndex;
            saveAnswersLocally();
        };

        function saveAnswersLocally() {
            if (!currentStudent) return;
            const draft = {
                studentCode: currentStudent.code,
                answers: studentAnswers,
                timestamp: Date.now()
            };
            localStorage.setItem(`exam_draft_${currentStudent.code}_W${CURRENT_WEEK}`, JSON.stringify(draft));
        }

        function loadSavedAnswers() {
            const saved = localStorage.getItem(`exam_draft_${currentStudent.code}_W${CURRENT_WEEK}`);
            if (saved) {
                try {
                    const draft = JSON.parse(saved);
                    studentAnswers = draft.answers || {};
                    
                    // Apply saved answers to UI
                    Object.keys(studentAnswers).forEach(qIndex => {
                        const optIndex = studentAnswers[qIndex];
                        const el = document.getElementById(`q${qIndex}opt${optIndex}`);
                        if (el) el.classList.add('selected');
                    });
                } catch (e) {
                    console.error('Error loading saved answers:', e);
                }
            }
        }

        // ========== Submit Exam ==========
        window.submitExam = async function() {
            // Check if all questions answered
            for (let i = 0; i < EXAM_QUESTIONS.length; i++) {
                if (studentAnswers[i] === undefined) {
                    showAlert(`❌ من فضلك أجب على السؤال ${i + 1}`, 'error');
                    
                    // Scroll to question
                    document.getElementById(`q${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }
            }

            showLoading();

            try {
                // Calculate score
                let score = 0;
                EXAM_QUESTIONS.forEach((q, index) => {
                    if (studentAnswers[index] === q.correct) {
                        score++;
                    }
                });

                const totalQuestions = EXAM_QUESTIONS.length;
                const monthlyPoints = score + (score === totalQuestions ? 1 : 0);
                
                // Create result document
                const resultId = `${currentStudent.code}_G${currentStudent.gradeLetter}_S${SUBJECT_LETTER}_W${CURRENT_WEEK}`;
                const resultRef = doc(db, 'results', resultId);
                
                const resultData = {
                    resultId: resultId,
                    studentCode: currentStudent.code,
                    studentName: currentStudent.name,
                    examId: EXAM_ID,
                    examSubject: SUBJECT_LETTER,
                    examSubjectName: SUBJECT_NAME,
                    grade: currentStudent.gradeLetter,
                    gradeLetter: currentStudent.gradeLetter,
                    week: CURRENT_WEEK,
                    score: score,
                    totalQuestions: totalQuestions,
                    monthlyPoints: monthlyPoints,
                    answers: studentAnswers,
                    date: new Date().toISOString(),
                    year: new Date().getFullYear(),
                    month: new Date().getMonth() + 1,
                    timestamp: Timestamp.now()
                };

                // Save to Firebase
                await setDoc(resultRef, resultData);

                // Update student stats
                try {
                    const studentRef = doc(db, 'students', currentStudent.code);
                    await setDoc(studentRef, {
                        name: currentStudent.name,
                        code: currentStudent.code,
                        gradeLetter: currentStudent.gradeLetter,
                        totalScore: increment(score),
                        monthlyPoints: increment(monthlyPoints),
                        lastExamDate: new Date().toISOString(),
                        lastExamScore: score,
                        lastExamId: EXAM_ID,
                        lastExamWeek: CURRENT_WEEK
                    }, { merge: true });
                } catch (error) {
                    console.warn('Could not update student stats:', error);
                }

                // Clear saved data
                localStorage.removeItem(`exam_draft_${currentStudent.code}_W${CURRENT_WEEK}`);
                clearTimer();

                // Show result
                document.getElementById('studentInfoSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('resultScore').textContent = `${score}/${totalQuestions}`;
                
                let resultHtml = `
                    <p style="font-size: 1.2rem; margin: 15px 0;">✅ تم تسجيل درجتك بنجاح</p>
                    <p>📊 الإجابات الصحيحة: ${score} من ${totalQuestions}</p>
                    <p>⭐ نقاط الترتيب: ${monthlyPoints}</p>
                `;
                
                // Show correct answers
                resultHtml += '<div style="text-align: right; margin-top: 20px; background: white; padding: 15px; border-radius: 15px;">';
                resultHtml += '<h4 style="margin-bottom: 10px;">📋 الإجابات النموذجية:</h4>';
                EXAM_QUESTIONS.forEach((q, index) => {
                    const userAnswer = studentAnswers[index];
                    const isCorrect = userAnswer === q.correct;
                    const correctLetter = String.fromCharCode(65 + q.correct);
                    const userLetter = userAnswer !== undefined ? String.fromCharCode(65 + userAnswer) : '-';
                    
                    resultHtml += `
                        <div style="padding: 8px; border-bottom: 1px solid #eee; color: ${isCorrect ? '#28a745' : '#dc3545'};">
                            <strong>سؤال ${index + 1}:</strong> 
                            ${isCorrect ? '✓' : '✗'} 
                            إجابتك: ${userLetter} | الإجابة الصحيحة: ${correctLetter}
                        </div>
                    `;
                });
                resultHtml += '</div>';
                
                document.getElementById('resultDetails').innerHTML = resultHtml;
                
                showAlert('✅ تم تسليم الامتحان بنجاح', 'success');

            } catch (error) {
                console.error('Submit error:', error);
                showAlert('❌ حدث خطأ في تسليم الامتحان', 'error');
            }

            hideLoading();
        };

        window.logout = function() {
            clearTimer();
            
            currentStudent = null;
            studentAnswers = {};
            
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('studentInfoSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('studentCode').value = '';
        };

        // Check for saved session on load
        window.addEventListener('load', () => {
            const savedCode = localStorage.getItem('studentCode');
            if (savedCode) {
                document.getElementById('studentCode').value = savedCode;
            }
        });

    </script>
</body>
</html>
