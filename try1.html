<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>IEC Smart Lab - إسماعيل عماد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* الحاوية الرئيسية - مضغوطة ومريحة */
        .iec-lab {
            width: 100%;
            max-width: 500px;
            background: #141a20;
            border-radius: 24px;
            box-shadow: 0 20px 40px #00000080, 0 0 0 1px #2a4055 inset;
            overflow: hidden;
            position: relative;
        }

        /* رأس المؤسسة - خفيف */
        .iec-header {
            background: #0f151b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a4055;
        }

        .iec-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .iec-logo {
            background: #0066cc;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .iec-brand span {
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .iec-phone {
            color: #88aacc;
            font-family: monospace;
            font-size: 0.9rem;
            background: #1a2630;
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid #2a4055;
        }

        /* منطقة الكتابة - كل التركيز هنا */
        .code-area {
            padding: 12px 12px 8px;
        }

        .code-label {
            color: #88aacc;
            font-size: 0.8rem;
            margin-bottom: 6px;
            display: flex;
            gap: 10px;
        }

        .code-label span {
            background: #1e2a33;
            padding: 2px 10px;
            border-radius: 30px;
        }

        /* المحرر الذكي - قلب التطبيق */
        .smart-editor {
            position: relative;
            width: 100%;
        }

        #codeInput {
            width: 100%;
            height: 180px;
            background: #0b1015;
            border: 2px solid #1e3a5a;
            border-radius: 20px;
            color: #f0f0f0;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            padding: 16px;
            resize: none;
            outline: none;
            direction: ltr;
            text-align: left;
            box-shadow: inset 0 4px 12px #000000;
            transition: 0.15s;
        }

        #codeInput:focus {
            border-color: #00aaff;
        }

        /* طبقة اللمسات الذكية - غير مرئية لكنها تعمل */
        .smart-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            padding: 18px;
            font-family: monospace;
            color: transparent;
            white-space: pre-wrap;
            overflow: hidden;
        }

        /* منطقة التشغيل والنتائج - ملتصقة تماماً */
        .run-console {
            padding: 0 12px 12px;
        }

        .run-btn-container {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .run-btn {
            flex: 1;
            background: #00a86b;
            border: none;
            color: white;
            padding: 14px 0;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 20px #00a86b66;
            border: 1px solid #88ffaa;
            cursor: pointer;
        }

        .run-btn:active {
            transform: scale(0.98);
        }

        .clear-btn {
            width: 50px;
            background: #2a3a4a;
            border: 1px solid #4a6a8a;
            border-radius: 40px;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }

        /* نافذة النتائج - مباشرة تحت الزر */
        .console-box {
            background: #0b1015;
            border: 2px solid #1e3a5a;
            border-radius: 20px;
            min-height: 100px;
            max-height: 150px;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            direction: ltr;
            text-align: left;
            color: #e0e0e0;
            scroll-behavior: smooth;
        }

        /* نظام الإشعارات الذكي - يظهر ويختفي */
        .smart-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e2a33;
            border: 2px solid #00aaff;
            border-radius: 60px;
            padding: 12px 24px;
            color: white;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px #000000cc;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            opacity: 0;
            transition: 0.3s;
            max-width: 90%;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }

        .smart-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #00aaff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .toast-message {
            flex: 1;
            direction: rtl;
        }

        /* شريط الأدوات السفلي - صغير جداً */
        .toolbar-mini {
            display: flex;
            padding: 8px 12px 12px;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mini-btn {
            background: #1e2a33;
            border: 1px solid #2a4055;
            color: #aaccff;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mini-btn:active {
            background: #2a3a4a;
        }

        /* للموبايل */
        @media (max-width: 400px) {
            #codeInput {
                height: 160px;
                font-size: 14px;
                padding: 12px;
            }
            
            .console-box {
                min-height: 80px;
                max-height: 120px;
                font-size: 13px;
            }
            
            .run-btn {
                padding: 12px 0;
                font-size: 1rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="iec-lab">
    <!-- رأس المؤسسة -->
    <div class="iec-header">
        <div class="iec-brand">
            <div class="iec-logo">IEC</div>
            <span> إسماعيل عماد</span>
        </div>
        <div class="iec-phone">01122104596</div>
    </div>

    <!-- منطقة الكتابة فقط -->
    <div class="code-area">
        <div class="code-label">
            <span>📝 اكتب كود JavaScript</span>
        </div>
        
        <!-- المحرر الذكي -->
        <div class="smart-editor">
            <textarea id="codeInput" placeholder="اكتب هنا..."></textarea>
        </div>
    </div>

    <!-- منطقة التشغيل والنتائج (ملتصقة) -->
    <div class="run-console">
        <div class="run-btn-container">
            <button class="run-btn" onclick="runCode()">
                <span>▶</span> تشغيل
            </button>
            <button class="clear-btn" onclick="clearConsole()">🗑️</button>
        </div>
        
        <!-- نافذة النتائج (تحت الزر مباشرة) -->
        <div id="consoleBox" class="console-box">
            <span style="color: #00aaff;">◉</span>  
        </div>
    </div>

    <!-- أدوات صغيرة جداً (أمثلة) -->
    <div class="toolbar-mini">
        <button class="mini-btn" onclick="loadExample('console.log(\'مرحبا\')')">📌 مثال</button>
        <button class="mini-btn" onclick="loadExample('console.log(5*5)')">🧮 حساب</button>
        <button class="mini-btn" onclick="loadExample('if(10>5){console.log(\"صحيح\")}')">🔀 if</button>
        <button class="mini-btn" onclick="fixQuotes()">💬 تصحيح</button>
    </div>
</div>

<!-- نظام الإشعارات الذكي (يظهر في أسفل الشاشة) -->
<div id="smartToast" class="smart-toast">
    <div class="toast-icon">✓</div>
    <div class="toast-message" id="toastMessage">رسالة ذكية</div>
</div>

<script>
    // ==================== التقنيات الخارقة ====================
    
    // عناصر الصفحة
    const codeInput = document.getElementById('codeInput');
    const consoleBox = document.getElementById('consoleBox');
    const toast = document.getElementById('smartToast');
    const toastMessage = document.getElementById('toastMessage');
    
    // متغيرات ذكية
    let toastTimeout = null;
    let lastCode = '';
    
    // ==================== 1. الإكمال التلقائي الذكي (فتح قوسين وعلامات) ====================
    codeInput.addEventListener('keydown', function(e) {
        const start = this.selectionStart;
        const end = this.selectionEnd;
        const value = this.value;
        
        // عند كتابة القوس (
        if (e.key === '(') {
            e.preventDefault();
            this.value = value.slice(0, start) + '()' + value.slice(end);
            this.selectionStart = this.selectionEnd = start + 1;
            showToast('✅ تم إضافة القوسين معاً', '👍');
        }
        
        // عند كتابة القوس {
        else if (e.key === '{') {
            e.preventDefault();
            this.value = value.slice(0, start) + '{}' + value.slice(end);
            this.selectionStart = this.selectionEnd = start + 1;
            showToast('✅ تم إضافة {} معاً', '✨');
        }
        
        // عند كتابة علامة التنصيص "
        else if (e.key === '"') {
            e.preventDefault();
            this.value = value.slice(0, start) + '""' + value.slice(end);
            this.selectionStart = this.selectionEnd = start + 1;
            showToast('✅ تم إضافة علامتي تنصيص', '📝');
        }
        
        // عند كتابة علامة التنصيص '
        else if (e.key === "'") {
            e.preventDefault();
            this.value = value.slice(0, start) + "''" + value.slice(end);
            this.selectionStart = this.selectionEnd = start + 1;
            showToast('✅ تم إضافة علامتي تنصيص', '📝');
        }
        
        // عند كتابة [
        else if (e.key === '[') {
            e.preventDefault();
            this.value = value.slice(0, start) + '[]' + value.slice(end);
            this.selectionStart = this.selectionEnd = start + 1;
            showToast('✅ تم إضافة [] معاً', '🔲');
        }
    });

    // ==================== 2. نظام كشف الأخطاء الذكي (بساطة شديدة) ====================
    codeInput.addEventListener('input', function() {
        const code = this.value;
        
        // كشف Console بحرف كبير (أشهر غلطة)
        if (code.includes('Console.log') || code.includes('CONSOLE.LOG')) {
            showToast('📢 انت كتبت Console بحرف كبير - اكتبه صغير console.log', '⚠️');
            
            // تصحيح تلقائي (اختياري)
            setTimeout(() => {
                if (this.value.includes('Console.log')) {
                    this.value = this.value.replace(/Console\.log/g, 'console.log');
                    this.value = this.value.replace(/CONSOLE\.LOG/g, 'console.log');
                }
            }, 100);
        }
        
        // كشف نسيان علامة =
        if (code.includes('==') && !code.includes('===')) {
            showToast('💡 استخدم === بدل == للمقارنة', '🔍');
        }
        
        // كشف قوس ناقص
        let openParen = (code.match(/\(/g) || []).length;
        let closeParen = (code.match(/\)/g) || []).length;
        if (openParen > closeParen) {
            showToast('🔴 في قوس ( مفتوح ومحتاج تقفله', '📌');
        }
        
        // كشف if بدون أقواس
        if (code.includes('if ') && !code.includes('{')) {
            showToast('⚠️ نسيت تكتب { بعد if', '🔀');
        }
        
        lastCode = code;
    });

    // ==================== 3. دالة التشغيل مع رسائل بسيطة جداً ====================
    function runCode() {
        let code = codeInput.value;
        
        // تصحيح تلقائي فوري
        code = code.replace(/Console\.log/gi, 'console.log');
        code = code.replace(/CONSOLE\.LOG/gi, 'console.log');
        code = code.replace(/Console=/gi, 'console=');
        
        if (!code.trim()) {
            showToast('📝 اكتب كود أولاً', '✏️');
            consoleBox.innerHTML = '<span style="color: #ffaa00;">◉ مفيش كود مكتوب</span>';
            return;
        }
        
        // حفظ الدوال
        const originalLog = console.log;
        const originalError = console.error;
        
        let outputs = [];
        let hasError = false;
        
        console.log = function(...args) {
            outputs.push(args.map(arg => String(arg)).join(' '));
        };
        
        console.error = function(...args) {
            outputs.push('❌ ' + args.map(String).join(' '));
            hasError = true;
        };
        
        try {
            const result = eval(code);
            
            // عرض النتائج
            if (outputs.length > 0) {
                consoleBox.innerHTML = outputs.map(o => 
                    `<span style="color: #00cc88;">◉</span> ${o}`
                ).join('<br>');
                
                if (!hasError) {
                    showToast('✅ تمام! الكود شغال', '🎉');
                }
            }
            else if (result !== undefined) {
                consoleBox.innerHTML = `<span style="color: #00cc88;">◉ النتيجة: ${result}</span>`;
                showToast('✅ اشتغل تمام', '👍');
            }
            else {
                consoleBox.innerHTML = '<span style="color: #00cc88;">◉ الكود اشتغل من غير أخطاء</span>';
                showToast('✅ تمام', '👌');
            }
            
        } catch (error) {
            hasError = true;
            
            // رسائل أخطاء مبسطة جداً للطالب
            let simpleError = '';
            
            if (error.message.includes('Console is not defined')) {
                simpleError = 'غلطة: كتبت Console بكبيرة - صححها لـ console';
                showToast('❌ ' + simpleError, '⚠️');
            }
            else if (error.message.includes('Unexpected token')) {
                simpleError = 'غلطة: في علامة زيادة أو ناقصة (زي قوس أو فاصلة)';
                showToast('❌ ' + simpleError, '🔍');
            }
            else if (error.message.includes('is not defined')) {
                let variable = error.message.match(/'([^']+)'/);
                if (variable) {
                    simpleError = `غلطة: المتغير '${variable[1]}' مش معرف - عرفه الأول`;
                } else {
                    simpleError = 'غلطة: في حاجة مش معرفة';
                }
                showToast('❌ ' + simpleError, '📦');
            }
            else if (error.message.includes('missing )')) {
                simpleError = 'غلطة: ناقص قوس ) قفل';
                showToast('❌ ' + simpleError, '📌');
            }
            else {
                simpleError = 'غلطة: ' + error.message.split('(')[0];
                showToast('❌ في غلطة بالكود', '⚠️');
            }
            
            consoleBox.innerHTML = `<span style="color: #ff6666;">◉ ${simpleError}</span>`;
            
        } finally {
            console.log = originalLog;
            console.error = originalError;
        }
    }

    // ==================== 4. دوال مساعدة ذكية ====================
    
    // عرض الإشعارات
    function showToast(message, icon = '✓') {
        toastMessage.textContent = message;
        toast.querySelector('.toast-icon').textContent = icon;
        toast.classList.add('show');
        
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
    
    // مسح النتائج
    function clearConsole() {
        consoleBox.innerHTML = '<span style="color: #00aaff;">◉</span> تم المسح';
        showToast('🧹 اتمسحت النتائج', '✨');
    }
    
    // تحميل مثال
    function loadExample(exCode) {
        codeInput.value = exCode;
        showToast('📥 تم تحميل المثال', '⚡');
    }
    
    // تصحيح التنصيص
    function fixQuotes() {
        let code = codeInput.value;
        let fixed = code.replace(/"/g, "'");
        if (fixed !== code) {
            codeInput.value = fixed;
            showToast('💬 تم تعديل التنصيص لـ \'', '✅');
        }
    }
    
    // ==================== 5. حماية ضد النسيان ====================
    // لو حاول يكتب console.log بشكل خطأ
    codeInput.addEventListener('keyup', function(e) {
        if (e.key === 'c' || e.key === 'C') {
            const before = this.value.slice(0, this.selectionStart);
            if (before.endsWith('Con') || before.endsWith('CON')) {
                showToast('📢 انتبه: console كلها small', '⚠️');
            }
        }
    });

    // حفظ تلقائي
    codeInput.addEventListener('input', function() {
        localStorage.setItem('iec-smart-code', this.value);
    });

    // تحميل المحفوظ
    window.onload = function() {
        const saved = localStorage.getItem('iec-smart-code');
        if (saved) {
            codeInput.value = saved;
        }
        
        // تجهيز الـ toast
        toast.style.position = 'fixed';
    };
</script>
</body>
</html>
