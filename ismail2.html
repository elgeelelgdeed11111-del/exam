<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>الجزء الثاني | مراجعة العلوم | أ. إسماعيل عماد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      background-image: radial-gradient(circle at 30% 40%, #2d2d44 2px, transparent 2px);
      background-size: 45px 45px;
      font-family: 'Cairo', 'Tajawal', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0 0 30px 0;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      background: rgba(180, 130, 255, 0.25);
      border-radius: 50%;
      animation: float 13s infinite ease-in-out;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      30% { opacity: 0.5; }
      70% { opacity: 0.2; }
      100% { transform: translateY(-15vh) scale(1.3); opacity: 0; }
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(245, 240, 255, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 36px;
      box-shadow: 0 35px 55px rgba(0,0,0,0.4), inset 0 1px 6px rgba(255,255,255,0.8);
      margin: 10px 8px 20px;
      position: relative;
      z-index: 2;
      border: 2px solid rgba(180, 150, 220, 0.5);
    }
    .teacher-bar {
      background: linear-gradient(135deg, #4a148c, #7b1fa2, #9c27b0);
      background-size: 250% 250%;
      animation: glow 6s ease infinite;
      border-radius: 0 0 32px 32px;
      padding: 18px 18px 14px;
      box-shadow: 0 22px 45px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 10px;
      border-bottom: 3px solid #e1bee7;
    }
    @keyframes glow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .teacher-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .teacher-icon {
      background: white;
      color: #4a148c;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
    }
    .teacher-name {
      font-size: 18px;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .teacher-phone {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
      color: #4a148c;
      padding: 7px 16px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 4px;
      direction: ltr;
    }
    .lock-screen {
      background: rgba(20, 15, 30, 0.92);
      backdrop-filter: blur(20px);
      border-radius: 34px;
      padding: 35px 20px;
      text-align: center;
      color: white;
      margin: 20px 16px;
      background: radial-gradient(circle at 30% 10%, #3a2a50, #140a20);
      border: 2px solid #b388ff;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6);
    }
    .lock-screen h2 {
      font-size: 24px;
      margin-bottom: 25px;
      color: #d1c4e9;
    }
    .code-input {
      background: #ffffff18;
      border: 2px dashed #b388ff;
      border-radius: 30px;
      padding: 14px 18px;
      font-size: 28px;
      text-align: center;
      color: white;
      width: 100%;
      letter-spacing: 6px;
      font-weight: bold;
      outline: none;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }
    .unlock-btn {
      background: #7c4dff;
      border: none;
      color: white;
      font-weight: 800;
      font-size: 19px;
      padding: 14px 30px;
      border-radius: 40px;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 0 #4a148c;
      letter-spacing: 1px;
    }
    .unlock-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #4a148c;
    }
    .error-msg {
      color: #ff8a80;
      margin-top: 10px;
      font-size: 15px;
    }
    .main-content {
      display: none;
      padding: 8px 10px 16px;
    }
    .subject-header {
      background: linear-gradient(115deg, #311b92, #1a1a40);
      border-radius: 28px;
      padding: 18px 12px;
      text-align: center;
      color: #ede7f6;
      margin: 12px 6px 24px;
      border: 2px solid #b388ff;
      box-shadow: 0 12px 20px rgba(0,0,0,0.3);
    }
    .subject-header h1 {
      font-size: 24px;
      font-weight: 800;
    }
    .question-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 24px;
      padding: 16px 14px;
      margin-bottom: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      transition: 0.3s ease;
    }
    .question-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.14);
    }
    .question-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 12px;
      background: #ede7f6;
      padding: 8px 14px;
      border-radius: 18px;
    }
    .badge {
      background: #6a1b9a;
      color: white;
      border-radius: 30px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 700;
    }
    .sub-question {
      margin-bottom: 10px;
      font-weight: 600;
      color: #1e1e2f;
    }
    .answer-toggle {
      background: #e8eaf6;
      border: 1px solid #9fa8da;
      border-radius: 20px;
      padding: 10px 14px;
      margin-top: 8px;
      font-weight: 600;
      color: #1a237e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .answer-box {
      background: #e8f5e9;
      border-radius: 20px;
      padding: 10px 14px;
      margin-top: 8px;
      border-right: 6px solid #43a047;
      font-size: 15px;
      font-weight: 700;
      color: #1e3a2f;
      display: none;
    }
    .answer-box.show {
      display: block;
    }
    .explain-box {
      background: #e3f2fd;
      border-radius: 16px;
      padding: 8px 14px;
      margin-top: 8px;
      font-size: 13px;
      color: #0d3c61;
      border-right: 4px solid #1e88e5;
      display: none;
    }
    .explain-box.show {
      display: block;
    }
  </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="container" id="appContainer">
  <div class="teacher-bar">
    <div class="teacher-info">
      <span class="teacher-icon">🧑‍🏫</span>
      <span class="teacher-name">أ. إسماعيل عماد</span>
    </div>
    <span class="teacher-phone">📞 01122104596</span>
  </div>

  <!-- شاشة القفل للجزء الثاني -->
  <div id="lockPanel" class="lock-screen">
    <h2>🔐 رمز الدخول</h2>
    <input type="password" id="codeInput" class="code-input" placeholder="•••••••" maxlength="7" inputmode="numeric">
    <button class="unlock-btn" id="unlockButton">🌟 دخول الجزء الثاني</button>
    <div id="errorMessage" class="error-msg"></div>
    <div style="margin-top: 24px; font-size: 14px; color: #aaa;">الأسئلة المكملة • علوم الصف الرابع</div>
  </div>

  <!-- المحتوى الرئيسي -->
  <div id="mainPanel" class="main-content">
    <div class="subject-header">
      <h1>🧬 الجزء الثاني • علوم الرابع</h1>
      <span style="font-size:15px; color:#d1c4e9;">الأسئلة المكملة للمراجعة ✨</span>
    </div>
    <div id="questionsContainer2"></div>
    <div style="text-align:center; margin-top:24px; color:#4a148c; font-weight:800;">📘 بالتوفيق يا أبطال 📘</div>
  </div>
</div>

<script>
  (function() {
    const LOCK_CODE = "1352007";

    const remainingQuestions = [
      { title:"أكمل", badge:"تعرية", content:"تتحرك الصخور والرمال بفعل ...........", answer:"التعرية." },
      { title:"تعريف", badge:"دلتا", content:"دلتا نهر النيل:", answer:"أرض مثلثة الشكل من رواسب الطمي عند المصب." },
      { title:"تعريف", badge:"نفط", content:"النفط:", answer:"مصدر طاقة حفري سائل غير متجدد." },
      { title:"تعريف", badge:"كثبان", content:"الكثبان الرملية:", answer:"تلال رملية بفعل الرياح في الصحراء." },
      { title:"ماذا يحدث", badge:"غاز", content:"اتحاد CO2 مع ماء الغلاف الجوي:", answer:"أمطار حمضية تآكل الصخور." },
      { title:"صوب", badge:"أخدود", content:"الأخدود الملون في تايلاند.", answer:"مصر (سيناء)." },
      { title:"نتائج", badge:"تضاريس", content:"حدوث التجوية والتعرية:", answer:"يتغير شكل السطح وتتكون تضاريس جديدة." },
      { title:"مصباح", badge:"طاقة", content:"الطاقة المفيدة من المصباح:", answer:"ضوئية. المهدرة: حرارية." },
      { title:"أكمل", badge:"وادي", content:"منطقة منخفضة بين جبلين قليلة الانحدار:", answer:"الوديان." },
      { title:"رياح", badge:"مسافة", content:"تدفع الرياح الرمال مسافة ........", answer:"طويلة." },
      { title:"قارن", badge:"كيمياء", content:"تفاعل الأكسجين والماء مع المعادن:", answer:"الأكسجين يصدأ، الماء يذيب." },
      { title:"مختلف", badge:"أجهزة", content:"سخان - مرآة مقعرة - مكواة", answer:"مرآة مقعرة (لا تسخن)." },
      { title:"بطاريات", badge:"شمس", content:"دور البطاريات مع الخلايا الشمسية:", answer:"تخزن الطاقة الكهربائية للتشغيل." },
      { title:"علامة", badge:"وادي", content:"يوجد وادي نخر في عمان. (✓)", answer:"✓." },
      { title:"علامة", badge:"أخاديد", content:"تتشابه الأخاديد شكلاً ولوناً. (✗)", answer:"✗ مختلفة." },
      { title:"علل", badge:"ترابط", content:"الترابط بين التجوية والتعرية:", answer:"التجوية تفتت والتعرية تنقل." },
      { title:"علل", badge:"فقد", content:"لا تصل كل الطاقة للجهاز:", answer:"جزء يفقد كحرارة مهدرة." },
      { title:"صنف", badge:"فحم", content:"الفحم: ........ ، الرياح: ........", answer:"الفحم غير متجدد، الرياح متجدد." },
      { title:"المنوفية", badge:"سبب", content:"ليس من أسباب التعرية:", answer:"جذور النباتات." },
      { title:"علل", badge:"ضباب", content:"خطورة الضباب الدخاني:", answer:"يهيج الجهاز التنفسي." },
      { title:"علل", badge:"بنزين", content:"البنزين الأكثر استخداماً:", answer:"سهولة النقل والكفاءة." },
      { title:"رياح", badge:"عامل", content:"الرياح من عوامل التعرية:", answer:"تنقل الرمال." },
      { title:"صدأ", badge:"لون", content:"يصدأ الحديد ويغير اللون:", answer:"أكسدة مع الأكسجين." },
      { title:"جداول", badge:"ماء", content:"تتكون الجداول بفعل ........", answer:"جريان الأمطار وذوبان الثلوج." },
      { title:"نباتات", badge:"فحم", content:"دفن نباتات ملايين السنين:", answer:"تتحول لفحم." },
      { title:"التقاء", badge:"رواسب", content:"التقاء مياه محملة بالرواسب بمياه ساكنة:", answer:"تترسب وتتكون الدلتا." },
      { title:"قلعة", badge:"رمال", content:"قلعة رملية تظل لسنين. (✗)", answer:"✗ تختفي بالأمواج." },
      { title:"تجمد", badge:"ماء", content:"عند التجمد يقل الحجم. (✗)", answer:"✗ يزداد الحجم." },
      { title:"مصدر", badge:"فحم", content:"الطاقة المختزنة في الفحم:", answer:"طاقة كيميائية أصلها شمسي." },
      { title:"أنواع", badge:"وقود", content:"أنواع الوقود:", answer:"وقود حيوي ووقود حفري." },
      { title:"عمليات", badge:"صخور", content:"عمليات تغير شكل الصخور:", answer:"تجوية، تعرية، ترسيب." },
      { title:"مصطلح", badge:"صدأ", content:"تجوية تسبب صدأ الحديد:", answer:"تجوية كيميائية." },
      { title:"قوة", badge:"جاذبية", content:"قوة تسحب الصخور للأسفل:", answer:"الجاذبية." },
      { title:"مصادر", badge:"غير متجددة", content:"مصدرين غير متجددين:", answer:"النفط، الفحم." },
      { title:"كيريوسيتي", badge:"مريخ", content:"أهمية عربة كيريوسيتي:", answer:"استكشاف المريخ." },
      { title:"أخاديد", badge:"مصر", content:"مثال أخدود في مصر:", answer:"الأخدود الملون بسيناء." },
      { title:"الشرقية", badge:"تعريف", content:"تكسير الصخور لقطع صغيرة:", answer:"التجوية." },
      { title:"تعريف", badge:"وقود", content:"الوقود:", answer:"مادة تنتج حرارة عند حرقها." },
      { title:"احتباس", badge:"حرارة", content:"الاحتباس الحراري:", answer:"ارتفاع حرارة الأرض بغازات الدفيئة." },
      { title:"دلتا", badge:"تعريف", content:"الدلتا:", answer:"أرض مثلثة من رواسب الأنهار." },
      { title:"طمي", badge:"تعريف", content:"الطمي:", answer:"حبيبات طين وغرين تزيد الخصوبة." },
      { title:"جذور", badge:"علامة", content:"نمو الجذور تجوية ميكانيكية. (✓)", answer:"✓." },
      { title:"مصباح", badge:"حرارة", content:"حرارة المصباح طاقة مهدرة:", answer:"لأن الغرض إضاءة وليس تدفئة." },
      { title:"كيميائية", badge:"أقوى", content:"التجوية الكيميائية أقوى:", answer:"تغير التركيب الكيميائي." },
      { title:"عمق", badge:"أخدود", content:"يزداد عمق الأخدود بزيادة:", answer:"سرعة النهر." },
      { title:"ألواح", badge:"شمسية", content:"أهمية الألواح الشمسية:", answer:"تحول الضوء لكهرباء." },
      { title:"توربينات", badge:"رياح", content:"أهمية التوربينات:", answer:"تولد كهرباء من الرياح." },
      { title:"رياح", badge:"تشكيل", content:"دور الرياح في تشكيل السطح:", answer:"نقل الرمال ونحت الصخور." },
      { title:"صوب", badge:"أمطار", content:"الأمطار الحمضية تجوية ميكانيكية.", answer:"كيميائية." },
      { title:"وادي رم", badge:"لون", content:"يميل وادي رم للأسود.", answer:"الأحمر/الوردي." },
      { title:"نهر", badge:"سريع", content:"نهر سريع على الصخور زمن طويل:", answer:"ينحت أخاديد عميقة." }
    ];

    const lockPanel = document.getElementById('lockPanel');
    const mainPanel = document.getElementById('mainPanel');
    const codeInput = document.getElementById('codeInput');
    const unlockBtn = document.getElementById('unlockButton');
    const errorMsg = document.getElementById('errorMessage');
    const container = document.getElementById('questionsContainer2');

    function renderRemaining() {
      if (!container) return;
      let html = '';
      remainingQuestions.forEach((q, i) => {
        html += `
          <div class="question-card">
            <div class="question-title"><span class="badge">${q.badge}</span> ${q.title}</div>
            <div class="sub-question">❓ ${q.content}</div>
            <div class="answer-toggle" data-idx="${i}"><span>🔎 اضغط للإجابة</span><span>👇</span></div>
            <div class="answer-box" id="ans2-${i}">✅ ${q.answer}</div>
          </div>`;
      });
      container.innerHTML = html;
      document.querySelectorAll('.answer-toggle').forEach(btn => {
        btn.addEventListener('click', function(){
          const idx = this.getAttribute('data-idx');
          const box = document.getElementById(`ans2-${idx}`);
          if(box) box.classList.toggle('show');
        });
      });
    }

    function checkCode() {
      if (codeInput.value.trim() === LOCK_CODE) {
        lockPanel.style.display = 'none';
        mainPanel.style.display = 'block';
        renderRemaining();
        errorMsg.textContent = '';
      } else {
        errorMsg.textContent = '❌ رمز خاطئ، حاول مرة أخرى';
        codeInput.value = '';
      }
    }

    unlockBtn.addEventListener('click', checkCode);
    codeInput.addEventListener('keypress', e => { if (e.key === 'Enter') checkCode(); });

    function createParticles() {
      const pContainer = document.getElementById('particles');
      for(let i=0;i<16;i++) {
        const p = document.createElement('div');
        p.className='particle';
        const s = Math.random()*8+4;
        p.style.width=s+'px'; p.style.height=s+'px';
        p.style.left=Math.random()*100+'%';
        p.style.animationDelay=Math.random()*10+'s';
        p.style.animationDuration=Math.random()*9+7+'s';
        pContainer.appendChild(p);
      }
    }
    createParticles();

    mainPanel.style.display = 'none';
    lockPanel.style.display = 'block';
  })();
</script>
</body>
</html>
